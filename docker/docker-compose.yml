version: '3.8'

networks:
  cadqstream:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  kafka_data:
  zookeeper_data:

services:
  # =====================================================
  # Apache Zookeeper
  # =====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cadqstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks: [cadqstream]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =====================================================
  # Apache Kafka
  # =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cadqstream-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [cadqstream]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Kafka Exporter for Prometheus
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: cadqstream-kafka-exporter
    command: --kafka.server=kafka:29092 --web.listen-address=:9308 --topic.filter.pattern=.*
    ports:
      - "9308:9308"
    networks: [cadqstream]

  # =====================================================
  # Data Generator (Kafka Producer)
  # =====================================================
  generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    container_name: cadqstream-generator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: taxi-trips
      EMIT_RATE: 10000
    networks: [cadqstream]
    restart: unless-stopped

  # =====================================================
  # Apache Flink JobManager
  # =====================================================
  jobmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: cadqstream-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        state.backend: rocksdb
        state.backend.incremental: 'true'
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
        parallelism.default: 2
    volumes:
      - ./flink:/opt/flink/job
    networks: [cadqstream]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Flink TaskManager
  taskmanager:
    image: flink:1.18-scala_2.12-java11
    container_name: cadqstream-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.backend.incremental: 'true'
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    volumes:
      - ./flink:/opt/flink/job
    networks: [cadqstream]

  # =====================================================
  # PostgreSQL
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: cadqstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cadqstream
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=8
    networks: [cadqstream]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadqstream -d cadqstream"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Exporter for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cadqstream-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://cadqstream:cadqstream_pass@postgres:5432/cadqstream?sslmode=disable
    command:
      - --extend.query-path=/config/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./prometheus/queries.yml:/config/queries.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cadqstream]

  # =====================================================
  # Prometheus
  # =====================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cadqstream-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
    networks: [cadqstream]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =====================================================
  # Grafana
  # =====================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cadqstream-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - postgres
    networks: [cadqstream]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================
  # Alertmanager (optional)
  # =====================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: cadqstream-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [cadqstream]
