global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # ── Flink metrics ──────────────────────────────────────────────
  - job_name: 'flink'
    static_configs:
      - targets:
          - 'jobmanager:8081'
          - 'taskmanager:8081'
    metrics_path: '/metrics'
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: instance

  # ── PostgreSQL metrics ─────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cadqstream-postgres'

  # ── Kafka consumer lag ─────────────────────────────────────────
  - job_name: 'kafka'
    static_configs:
      - targets:
          - 'kafka-exporter:9308'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cadqstream-kafka'

  # ── Prometheus self-monitoring ──────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
