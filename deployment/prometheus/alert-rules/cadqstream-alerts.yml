groups:
  - name: kafka_alerts
    interval: 30s
    rules:
      # Kafka Broker Down
      - alert: KafkaBrokerDown
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: kafka
          component: broker
        annotations:
          summary: "Kafka broker is down"
          description: "Kafka metrics exporter has been unreachable for 2 minutes."

      # Kafka Consumer Lag High
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag_sum > 10000
        for: 5m
        labels:
          severity: warning
          service: kafka
          component: consumer
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group lag on topic {{ $labels.topic }} is {{ $value }} messages behind."

      # Kafka Under-Replicated Partitions
      - alert: KafkaUnderReplicatedPartitions
        expr: kafka_topic_partition_under_replicated_topic > 0
        for: 2m
        labels:
          severity: critical
          service: kafka
          component: replication
        annotations:
          summary: "Kafka has under-replicated partitions"
          description: "{{ $value }} partition(s) are under-replicated on topic {{ $labels.topic }}."

      # Kafka Offline Partitions
      - alert: KafkaOfflinePartitions
        expr: kafka_topic_partition_offline_log_directory > 0
        for: 1m
        labels:
          severity: critical
          service: kafka
          component: storage
        annotations:
          summary: "Kafka has offline partitions"
          description: "{{ $value }} partition(s) are offline on topic {{ $labels.topic }}."

      # Kafka High Produce Rate Drop
      - alert: KafkaProduceRateDrop
        expr: |
          (
            rate(kafka_server_BrokerTopicMetrics_MessagesInPerSec{topic=~"taxi-nyc-raw|dq-stream-processed"}[5m])
            /
            rate(kafka_server_BrokerTopicMetrics_MessagesInPerSec{topic=~"taxi-nyc-raw|dq-stream-processed"}[5m] offset 15m)
          ) < 0.5
        for: 5m
        labels:
          severity: warning
          service: kafka
          component: throughput
        annotations:
          summary: "Kafka produce rate dropped significantly"
          description: "Topic {{ $labels.topic }} message rate dropped by more than 50% compared to 15 minutes ago."

      # Kafka High Request Latency
      - alert: KafkaHighRequestLatency
        expr: kafka_network_RequestMetrics_RequestsPerSec{quantile="0.99"} > 100
        for: 5m
        labels:
          severity: warning
          service: kafka
          component: latency
        annotations:
          summary: "Kafka request latency is high"
          description: "P99 Kafka request latency is {{ $value }}ms on {{ $labels.instance }}."

      # Kafka Exporter Down
      - alert: KafkaExporterDown
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: warning
          service: kafka
          component: exporter
        annotations:
          summary: "Kafka exporter is down"
          description: "Kafka metrics exporter has been unreachable for 2 minutes."

  - name: flink_alerts
    interval: 30s
    rules:
      # Flink Job Failed
      - alert: FlinkJobFailed
        expr: flink_jobmanager_job_status{status="FAILED"} > 0
        for: 1m
        labels:
          severity: critical
          service: flink
          component: job
        annotations:
          summary: "Flink job has failed"
          description: "Flink job {{ $labels.job_name }} has entered FAILED state on {{ $labels.instance }}."

      # Flink Job Restarting
      - alert: FlinkJobRestarting
        expr: rate(flink_jobmanager_job_restarting_job_count_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: flink
          component: job
        annotations:
          summary: "Flink job is restarting frequently"
          description: "Flink job {{ $labels.job_name }} has a restart rate of {{ $value }} restarts/sec."

      # Flink Checkpoint Failure
      - alert: FlinkCheckpointFailure
        expr: |
          rate(flink_jobmanager_job_checkpointing_number_failed_overall[10m]) > 0
        for: 5m
        labels:
          severity: critical
          service: flink
          component: checkpoint
        annotations:
          summary: "Flink checkpoint failures detected"
          description: "Flink job {{ $labels.job_name }} has failed checkpoints. Last {{ $value }} failures in 10 minutes."

      # Flink Checkpoint Alignment Duration High
      - alert: FlinkCheckpointAlignmentHigh
        expr: flink_jobmanager_job_checkpointing_alignment_duration_seconds{quantile="0.99"} > 30
        for: 10m
        labels:
          severity: warning
          service: flink
          component: checkpoint
        annotations:
          summary: "Flink checkpoint alignment is slow"
          description: "P99 checkpoint alignment duration is {{ $value }}s for job {{ $labels.job_name }}."

      # Flink TaskManager Down (disabled - TM is Python-only, no /metrics endpoint)
      # The cadqstream-metrics:9250 / cadqstream-app target is the correct health check.
      # - alert: FlinkTaskManagerDown
      #   expr: up{job="cadqstream-app"} == 0
      #   for: 2m
      #   labels:
      #     severity: critical
      #     service: flink
      #     component: taskmanager
      #   annotations:
      #     summary: "Flink TaskManager / cadqstream-metrics is down"
      #     description: "cadqstream-metrics endpoint unreachable for 2 minutes."

      # Flink High GC Time
      - alert: FlinkHighGCTime
        expr: |
          rate(jvm_gc_pause_seconds_sum{gc_action="end of major GC"}[5m]) > 5
          or
          rate(jvm_gc_pause_seconds_sum{gc_action="end of minor GC"}[5m]) > 30
        for: 10m
        labels:
          severity: warning
          service: flink
          component: jvm
        annotations:
          summary: "Flink high garbage collection time"
          description: "JVM GC pause time is elevated on {{ $labels.instance }}. This may impact processing latency."

      # Flink JobManager Down
      - alert: FlinkJobManagerDown
        expr: up{job="flink-jobmanager"} == 0
        for: 1m
        labels:
          severity: critical
          service: flink
          component: jobmanager
        annotations:
          summary: "Flink JobManager is down"
          description: "Flink JobManager has been unreachable for 1 minute. No jobs can run."

      # Flink Low Checkpoint Progress
      - alert: FlinkCheckpointProgressLow
        expr: |
          rate(flink_jobmanager_job_checkpointing_number_in_progress[5m]) == 0
          and
          rate(flink_jobmanager_job_checkpointing_number_completed[30m]) == 0
        for: 45m
        labels:
          severity: warning
          service: flink
          component: checkpoint
        annotations:
          summary: "Flink checkpoint progress stalled"
          description: "No completed checkpoints in the last 30 minutes for job {{ $labels.job_name }}."

      # Flink High Processed Records (disabled - TM job metrics unavailable)
      # TM throughput metrics require the flink-taskmanager scrape which is DOWN.
      # Pipeline throughput is tracked via cadqstream_records_valid_total in Grafana.
      # - alert: FlinkProcessedRecordsHigh
      #   expr: rate(flink_taskmanager_job_task_numRecordsOutPerSecond_sum[5m]) > 1000000
      #   for: 10m
      #   labels:
      #     severity: info
      #     service: flink
      #     component: throughput
      #   annotations:
      #     summary: "Flink high throughput"
      #     description: "Flink task {{ $labels.task_name }} is processing {{ $value | humanize }} records/sec."

  - name: infrastructure_alerts
    interval: 30s
    rules:
      # Host High Memory Usage
      - alert: HostHighMemoryUsage
        expr: |
          1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
          service: infrastructure
          component: memory
        annotations:
          summary: "Host memory usage is high"
          description: "Memory usage on {{ $labels.instance }} is {{ $value | humanizePercentage }}."

      # Host Disk Space Low
      - alert: HostDiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: critical
          service: infrastructure
          component: disk
        annotations:
          summary: "Host disk space is low"
          description: "Disk usage on {{ $labels.instance }} is {{ $value | humanizePercentage }} free."

      # Host Disk I/O High
      - alert: HostHighDiskIO
        expr: |
          rate(node_disk_io_time_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          service: infrastructure
          component: disk
        annotations:
          summary: "Host disk I/O utilization is high"
          description: "Disk I/O utilization on {{ $labels.instance }} is {{ $value | humanizePercentage }}."

      # Host CPU High
      - alert: HostHighCPU
        expr: |
          100 - (rate(node_cpu_seconds_total{mode="idle"}[5m]) * 100) > 90
        for: 15m
        labels:
          severity: warning
          service: infrastructure
          component: cpu
        annotations:
          summary: "Host CPU usage is very high"
          description: "CPU usage on {{ $labels.instance }} has been above 90% for 15 minutes."

      # Container Restart Loop
      - alert: ContainerRestartLoop
        expr: |
          rate(container_restart_count[15m]) > 0.5
        for: 10m
        labels:
          severity: critical
          service: infrastructure
          component: container
        annotations:
          summary: "Container is in restart loop"
          description: "Container {{ $labels.container_label_com_docker_compose_service }} is restarting more than twice per minute."

      # Prometheus Target Down
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 3m
        labels:
          severity: warning
          service: monitoring
          component: prometheus
        annotations:
          summary: "Prometheus scrape target is down"
          description: "Target {{ $labels.job }} at {{ $labels.instance }} has been down for 3 minutes."

      # Prometheus High Scraping Latency
      - alert: PrometheusHighScrapeLatency
        expr: |
          prometheus_target_interval_length_seconds{quantile="0.99"} > 20
        for: 5m
        labels:
          severity: warning
          service: monitoring
          component: prometheus
        annotations:
          summary: "Prometheus scrape interval is high"
          description: "P99 scrape interval on {{ $labels.job }} is {{ $value }}s (expected 15s)."

      # MinIO Down
      - alert: MinIODown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: critical
          service: minio
          component: storage
        annotations:
          summary: "MinIO is down"
          description: "MinIO object storage has been unreachable for 2 minutes."

  - name: memstream_alerts
    interval: 30s
    rules:
      # ============================================================
      # Phase 5B: SLO-based MemStream Alerts
      # ============================================================

      # 1. MemStream_MemoryHorizon: Memory cycle time < 300s
      # Alert when actual memory cycle is too fast (memory under-sizing or high churn)
      - alert: MemStream_MemoryHorizonViolation
        expr: memstream_memory_cycle_seconds < 300
        for: 10m
        labels:
          severity: warning
          service: memstream
          component: memory
        annotations:
          summary: "MemStream memory horizon is too short"
          description: "Memory cycle time {{ $value | humanizeDuration }} is below 300s SLO. Memory may be under-sized or experiencing excessive churn."

      # 2. MemStream_CellCoverage: Minimum cell samples per neighborhood < 10
      # Alert when ContextBeta cells are underpopulated (unreliable thresholds)
      - alert: MemStream_CellCoverageLow
        expr: min(memstream_contextbeta_cell_samples) < 10
        for: 5m
        labels:
          severity: warning
          service: memstream
          component: contextbeta
        annotations:
          summary: "MemStream ContextBeta cell coverage is low"
          description: "ContextBeta cell has < 10 samples in neighborhood {{ $labels.neighborhood }}. Threshold may be unreliable."

      # 3. MemStream_KNNStability: kNN distance drift > 2x baseline for > 1h
      # Alert when kNN distances significantly exceed warmup baseline
      - alert: MemStream_KNNStabilityViolation
        expr: memstream_knn_distance_rolling / memstream_knn_distance_baseline > 2.0
        for: 1h
        labels:
          severity: warning
          service: memstream
          component: knn
        annotations:
          summary: "MemStream kNN distance significantly elevated"
          description: "kNN distance is {{ $value | printf \"%.1f\" }}x baseline — potential distribution shift detected for {{ $labels.neighborhood }}"

      # 4. MemStream_BetaStaleness: Time since last beta update > 1h
      # Alert when ContextBeta thresholds haven't been updated
      - alert: MemStream_BetaStalenessHigh
        expr: memstream_beta_last_update_seconds > 3600
        for: 15m
        labels:
          severity: warning
          service: memstream
          component: contextbeta
        annotations:
          summary: "MemStream beta thresholds are stale"
          description: "No beta update for {{ $value | humanizeDuration }} in neighborhood {{ $labels.neighborhood }}. IEC may be malfunctioning."

      # 5. MemStream_IECNeighborhoodCoverage: Active ADWIN neighborhoods < 10
      # Alert when IEC drift detection coverage is incomplete
      - alert: MemStream_IECNeighborhoodCoverageLow
        expr: count(memstream_adwin_active == 1) < 10
        for: 30m
        labels:
          severity: warning
          service: memstream
          component: iec
        annotations:
          summary: "MemStream IEC drift detection coverage is low"
          description: "Only {{ $value }} neighborhoods have active ADWIN. Expected 10 for full coverage."

      # ============================================================
      # Existing MemStream Alerts (preserved)
      # ============================================================

      # Anomaly rate spikes
      - alert: MemStream_AnomalyRateSpike
        expr: memstream_anomaly_rate > 0.15
        for: 4h
        labels:
          severity: warning
          service: memstream
          component: scoring
        annotations:
          summary: "MemStream anomaly rate elevated for 4+ hours"
          description: "Anomaly rate {{ $value | humanizePercentage }} exceeds 15% SLO for 4 consecutive hours"

      - alert: MemStream_CriticalAnomalyRate
        expr: memstream_anomaly_rate > 0.25
        for: 2h
        labels:
          severity: critical
          service: memstream
          component: scoring
        annotations:
          summary: "MemStream anomaly rate critically elevated"
          description: "Anomaly rate {{ $value | humanizePercentage }} exceeds 25% critical threshold for 2 consecutive hours"

      # HMAC verification failures (Security)
      - alert: MemStream_HMACVerificationFailures
        expr: rate(memstream_hmac_verification_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: memstream
          component: security
        annotations:
          summary: "HMAC verification failures detected"
          description: "Model signature verification is failing — potential security incident on {{ $labels.instance }}"

      # Model HMAC failure - hard failure alert
      - alert: MemStream_ModelHMACFailure
        expr: rate(memstream_model_hmac_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: memstream
          component: security
        annotations:
          summary: "Model HMAC verification failed"
          description: "MemStream model HMAC verification failed. Model loading blocked — system in degraded mode."

      # Circuit breaker
      - alert: MemStream_CircuitBreakerTripped
        expr: memstream_circuit_breaker_state == 1
        for: 5m
        labels:
          severity: warning
          service: memstream
          component: iec
        annotations:
          summary: "MemStream IEC circuit breaker open"
          description: "Circuit breaker has been open for {{ $value | humanizeDuration }}. IEC degraded mode active."

      # Checkpoint latency
      - alert: MemStream_CheckpointLatency
        expr: memstream_checkpoint_save_seconds > 30
        for: 5m
        labels:
          severity: warning
          service: memstream
          component: checkpoint
        annotations:
          summary: "MemStream checkpoint save slow"
          description: "Checkpoint save took {{ $value | humanizeDuration }}, exceeding 30s SLO"

      # Checkpoint corruption detection
      - alert: MemStream_CheckpointCorruption
        expr: rate(memstream_checkpoint_corruption_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: memstream
          component: checkpoint
        annotations:
          summary: "MemStream checkpoint corruption detected"
          description: "Checkpoint corruption detected on {{ $labels.instance }}. HMAC verification failed. Restoring from previous checkpoint."

      # Redis connection failure (IEC degradation)
      - alert: MemStream_RedisConnectionFailure
        expr: rate(memstream_redis_connection_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: memstream
          component: redis
        annotations:
          summary: "MemStream Redis connection failure"
          description: "Redis connection failure detected. IEC operating in silent degradation mode."

      # Warmup incomplete
      - alert: MemStream_WarmupIncomplete
        expr: memstream_warmup_complete == 0
        for: 30m
        labels:
          severity: warning
          service: memstream
          component: warmup
        annotations:
          summary: "MemStream warmup not complete"
          description: "MemStream has not completed warmup after 30 minutes. Anomaly detection may be unreliable."

      # kNN query latency
      - alert: MemStream_KNNQueryLatencyHigh
        expr: histogram_quantile(0.95, rate(memstream_knn_query_duration_seconds_bucket[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: memstream
          component: knn
        annotations:
          summary: "MemStream kNN query latency high"
          description: "P95 kNN query latency is {{ $value | humanizeDuration }}, exceeding 100ms threshold"

      # Memory utilization per neighborhood
      - alert: MemStream_MemoryUtilizationHigh
        expr: memstream_memory_utilization > 0.9
        for: 15m
        labels:
          severity: warning
          service: memstream
          component: memory
        annotations:
          summary: "MemStream memory utilization high"
          description: "Memory utilization in neighborhood {{ $labels.neighborhood }} is {{ $value | humanizePercentage }}"

      # Keep existing groups unchanged:
      # - kafka_alerts
      # - flink_alerts
      # - infrastructure_alerts
