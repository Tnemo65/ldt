# Grafana Unified Alerting Provisioning
# Alerts fire in Grafana UI at http://localhost:3000/alerts
# To configure real notifications (email, Slack, PagerDuty, etc.):
#   Grafana UI → Alerting → Contact points → Add contact point
#   Then update Notification policies to route alerts.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: "no-op"
    receivers:
      - uid: no-op-receiver
        type: "webhook"
        settings:
          url: "http://127.0.0.1:9999/noop"
          httpMethod: POST

policies:
  - orgId: 1
    receiver: "no-op"
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
