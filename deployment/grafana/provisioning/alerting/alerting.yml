# Grafana Unified Alerting Provisioning Configuration
# CA-DQStream alerting rules - mirrors key Prometheus alerts

apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure_alerts
    folder: Grafana
    interval: 1m
    rules:
      # Prometheus Target Down
      - orgId: 1
        uid: prometheus_target_down
        title: Prometheus Target Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up == 0
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
              expression: A
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
              expression: B
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 3m
        annotations:
          summary: Prometheus scrape target is down
          description: Target {{ $labels.job }} at {{ $labels.instance }} has been down for 3 minutes.
        labels:
          severity: warning
          service: monitoring
          component: prometheus

      # Host High Memory Usage
      - orgId: 1
        uid: host_high_memory
        title: Host High Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
              expression: A
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
              expression: B
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Host memory usage is high
          description: Memory usage on {{ $labels.instance }} exceeds 85%.
        labels:
          severity: warning
          service: infrastructure
          component: memory

      # Host Disk Space Low
      - orgId: 1
        uid: host_disk_space_low
        title: Host Disk Space Low
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
              expression: A
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.2
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
              expression: B
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Host disk space is low
          description: Disk usage on {{ $labels.instance }} is above 80%.
        labels:
          severity: critical
          service: infrastructure
          component: disk

contactPoints:
  # Safe no-op fallback (all alerts route here by default)
  - orgId: 1
    name: no-op-webhook
    receivers:
      - uid: no-op-webhook
        type: webhook
        settings:
          url: "http://127.0.0.1:9999/noop"
          httpMethod: POST
        disableResolveMessage: false

policies:
  # Default routing: all alerts -> no-op (safe default)
  - orgId: 1
    receiver: no-op-webhook
    group_by:
      - alertname
      - severity
      - cluster
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
