# Grafana dashboard provisioning provider
# Dashboards mounted via ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
apiVersion: 1

providers:
  - name: 'CA-DQStream'
    orgId: 1
    folder: 'CA-DQStream'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
