#!/bin/bash
# Fix pg_hba.conf to allow trust authentication for Docker network
set -e

PG_HBA="/var/lib/postgresql/data/pg_hba.conf"

echo "=== Fixing pg_hba.conf for trust auth ==="

# Comment out the md5 rule and add trust
if grep -q "^host all all all md5$" "$PG_HBA"; then
    sed -i 's/^host all all all md5$/host all all 0.0.0.0\/0 trust/' "$PG_HBA"
    echo "host all all ::0\/0 trust" >> "$PG_HBA"
    echo "=== Fixed pg_hba.conf (last 5 lines) ==="
    tail -5 "$PG_HBA"
else
    echo "No md5 rule found, checking current state:"
    grep "host all" "$PG_HBA"
fi

echo "=== pg_hba fix complete ==="
