# =============================================================================
# PostgreSQL Exporter Custom Queries
# =============================================================================

# Override default queries with CA-DQStream specific metrics

# Connection pool stats (via PgBouncer admin views)
pgbouncer_pools:
  query: |
    SELECT
      datname,
      pool_mode,
      num_server_conns,
      num_client_conns,
      num_waiting_clients,
      maxwait_us / 1000 AS maxwait_ms,
      avg_pool_size
    FROM pgbouncer.pools
    WHERE datname = 'dq_pipeline'

pgbouncer_stats:
  query: |
    SELECT
      datname,
      sum(num_requests) AS total_requests,
      sum(total_query_time) AS total_query_time_ms,
      sum(total_wait_time) AS total_wait_time_ms,
      sum(total_tx_count) AS total_transactions,
      avg(avg_query_count) AS avg_queries_per_second,
      avg(avg_query_time) AS avg_query_time_ms,
      max(cli_maxwait_us / 1000) AS max_client_wait_ms
    FROM pgbouncer.stat
    WHERE datname = 'dq_pipeline'
    GROUP BY datname

# Table-level stats
cadqstream_table_stats:
  query: |
    SELECT
      schemaname,
      relname AS table_name,
      n_live_tup AS row_count,
      n_dead_tup AS dead_rows,
      n_mod_since_analyze AS rows_modified,
      last_vacuum,
      last_autovacuum,
      last_analyze,
      last_autoanalyze,
      vacuum_count,
      autovacuum_count,
      analyze_count,
      autoanalyze_count
    FROM pg_stat_user_tables
    WHERE schemaname = 'public'
    ORDER BY n_live_tup DESC

# Index usage stats
cadqstream_index_stats:
  query: |
    SELECT
      schemaname,
      tablename,
      indexname,
      idx_scan,
      idx_tup_read,
      idx_tup_fetch,
      idx_blks_read,
      idx_blks_hit,
      ROUND(100.0 * idx_blks_hit / NULLIF(idx_blks_hit + idx_blks_read, 0), 2) AS index_hit_rate
    FROM pg_stat_user_indexes
    WHERE schemaname = 'public'
    ORDER BY idx_scan DESC

# Slow queries (custom via pg_stat_statements if available)
slow_queries:
  query: |
    SELECT
      substring(query, 1, 200) AS query_preview,
      calls,
      total_exec_time / 1000 AS total_exec_seconds,
      mean_exec_time AS mean_exec_ms,
      max_exec_time AS max_exec_ms,
      min_exec_time AS min_exec_ms,
      stddev_exec_time AS stddev_ms,
      rows
    FROM pg_stat_statements
    WHERE query LIKE '%taxi_trips%'
       OR query LIKE '%violations%'
       OR query LIKE '%anomaly_scores%'
       OR query LIKE '%meta_metrics%'
       OR query LIKE '%drift_events%'
    ORDER BY total_exec_time DESC
    LIMIT 20

# WAL and replication (for future HA setup)
wal_stats:
  query: |
    SELECT
      pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn) AS replication_lag_bytes,
      sent_lsn,
      write_lsn,
      flush_lsn,
      replay_lsn,
      write_lag,
      flush_lag,
      replay_lag,
      state,
      sync_state
    FROM pg_stat_replication

# Sequence usage
sequence_stats:
  query: |
    SELECT
      schemaname,
      relname AS sequence_name,
      last_value,
      min_value,
      max_value,
      cache_size,
      cycle
    FROM pg_sequences
    WHERE schemaname = 'public'

# Cache hit rates
cache_hit_ratio:
  query: |
    SELECT
      'index' AS type,
      ROUND(100.0 * SUM(idx_blks_hit) / NULLIF(SUM(idx_blks_hit) + SUM(idx_blks_read), 0), 2) AS hit_ratio,
      SUM(idx_blks_hit) AS hits,
      SUM(idx_blks_read) AS reads
    FROM pg_statio_user_indexes
    UNION ALL
    SELECT
      'table' AS type,
      ROUND(100.0 * SUM(heap_blks_hit) / NULLIF(SUM(heap_blks_hit) + SUM(heap_blks_read), 0), 2) AS hit_ratio,
      SUM(heap_blks_hit) AS hits,
      SUM(heap_blks_read) AS reads
    FROM pg_statio_user_tables

# Transaction stats
transaction_stats:
  query: |
    SELECT
      conflicts AS deadlocks,
      temp_files,
      temp_bytes,
      deadlocks,
      xact_rollback AS rolled_back,
      blks_read,
      blks_hit,
      ROUND(100.0 * blks_hit / NULLIF(blks_hit + blks_read, 0), 2) AS cache_hit_ratio
    FROM pg_stat_database
    WHERE datname = 'dq_pipeline'
