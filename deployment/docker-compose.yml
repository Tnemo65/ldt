# =============================================================================
# CA-DQStream Production Deployment - docker-compose.yml
# Architecture: 4-Layer streaming pipeline (Baseline -> Dual-Branch ->
#               Rendezvous+Meta -> IEC) on Apache Flink 1.17.1
# Run: docker compose -f deployment/docker-compose.yml up -d
# =============================================================================

networks:
  cadqstream-net:
    name: cadqstream-net
    driver: bridge

volumes:
  # Infrastructure volumes
  zookeeper-data:
    name: ldt-zookeeper-data
  kafka-data:
    name: ldt-kafka-data
  postgres-data:
    name: ldt-postgres-data
  minio-data:
    name: ldt-minio-data

  # Observability volumes
  prometheus-data:
    name: ldt-prometheus-data
  grafana-data:
    name: ldt-grafana-data
  mlflow-data:
    name: ldt-mlflow-data

  # Flink volumes
  flink-jobmanager-log:
    name: ldt-flink-jobmanager-log
  flink-jobmanager-data:
    name: ldt-flink-jobmanager-data
  flink-taskmanager-log:
    name: ldt-flink-taskmanager-log
  flink-taskmanager-data:
    name: ldt-flink-taskmanager-data

services:
  # =============================================================================
  # LAYER 1: Kafka Infrastructure
  # =============================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ldt-zookeeper
    hostname: zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ldt-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 1000
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: localhost
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    mem_limit: 4g
    shm_size: 256m
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ldt-kafka-init
    hostname: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/01-create-topics.sh"]
    volumes:
      - ./kafka/init-scripts:/scripts:ro
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: ldt-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    ports:
      - "8082:8081"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ldt-kafka-ui
    hostname: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      KAFKA_CLUSTERS_0_NAME: cadqstream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIGURATION_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.6.0
    container_name: ldt-kafka-exporter
    hostname: kafka-exporter
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9308/metrics || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --topic.filter=.*
      - --group.filter=.*
    ports:
      - "9308:9308"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # =============================================================================
  # LAYER 2: Database Services
  # =============================================================================

  postgres:
    image: postgres:15
    container_name: ldt-postgres
    hostname: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadqstream -d dq_pipeline"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      POSTGRES_DB: dq_pipeline
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - cadqstream-net
    restart: unless-stopped
    mem_limit: 2g
    shm_size: 128m
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ldt-pgbouncer
    hostname: pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep pgbouncer || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DATABASE_URL: "postgres://cadqstream:cadqstream123@postgres:5432/dq_pipeline"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY: "DISCARD ALL"
      SERVER_CHECK_DELAY: "0"
      SERVER_LIFETIME: "3600"
      SERVER_IDLE_TIMEOUT: "600"
    ports:
      - "6432:5432"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.8.0
    container_name: ldt-pgbouncer-exporter
    hostname: pgbouncer-exporter
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9637/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      DATA_SOURCE_NAME: "postgres://cadqstream:cadqstream123@pgbouncer:5432/dq_pipeline?sslmode=disable"
    ports:
      - "9637:9637"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ldt-postgres-exporter
    hostname: postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9187/metrics || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s
    environment:
      DATA_SOURCE_NAME: "postgresql://cadqstream:cadqstream123@postgres:5432/dq_pipeline?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_CONSTANT_LABELS: "env=cadqstream"
    command:
      - --web.listen-address=:9187
      - --web.telemetry-path=/metrics
      - --extend.query-path=/etc/pg_exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./postgres/queries.yml:/etc/pg_exporter/queries.yml:ro
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # =============================================================================
  # LAYER 3: Storage Services
  # =============================================================================

  minio:
    image: minio/minio:latest
    container_name: ldt-minio
    hostname: minio
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  minio-init:
    image: minio/mc:latest
    container_name: ldt-minio-init
    hostname: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/01-create-buckets.sh"]
    volumes:
      - ./minio/init-scripts:/scripts:ro
    environment:
      MC_HOST: http://minio:9000
      MC_USER: minioadmin
      MC_PASS: minioadmin123
      MC_ALIAS: local

  # =============================================================================
  # LAYER 4: Flink Streaming
  # =============================================================================

  flink-jobmanager:
    image: ldt-flink:1.17.1-py
    container_name: ldt-flink-jobmanager
    hostname: flink-jobmanager
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      JOB_MANAGER_RPC_PORT: 6123
      JOB_MANAGER_REST_PORT: 8081
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 4
      FLINK_PROPERTIES: |
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
        state.checkpoints.num-retained: 3
        execution.checkpointing.max-concurrent-checkpoints: 1
        execution.checkpointing.min-pause: 30000
        execution.checkpointing.timeout: 300000
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        restart-strategy: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 10000
        restart-strategy.exponential-delay.max-backoff: 300000
        restart-strategy.exponential-delay.backoff-multiplier: 2.0
        restart-strategy.exponential-delay.reset-backoff-threshold: 600000
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9248
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        parallelism.default: 4
        taskmanager.memory.process.size: 4096m
        taskmanager.memory.managed.fraction: 0.4
        kafka.bootstrap.servers: kafka:9092
        jdbc.connection.max-retry-timeout: 60s
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "5432"
      POSTGRES_DB: dq_pipeline
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip
    ports:
      - "8081:8081"
    volumes:
      - flink-jobmanager-log:/opt/flink/log
      - flink-jobmanager-data:/tmp
      - C:/proj/ldt/src:/opt/flink/e2e/src:ro
      - C:/proj/ldt/scripts:/opt/flink/e2e/scripts:ro
    networks:
      - cadqstream-net
    restart: unless-stopped
    command: jobmanager
    mem_limit: 2g
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G

  flink-taskmanager:
    image: ldt-flink:1.17.1-py
    container_name: ldt-flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://flink-jobmanager:8081/overview || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      JOB_MANAGER_RPC_PORT: 6123
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 4
      FLINK_PROPERTIES: |
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        state.savepoints.dir: file:///tmp/flink-savepoints
        taskmanager.memory.process.size: 4096m
        taskmanager.memory.managed.fraction: 0.4
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        parallelism.default: 4
        kafka.bootstrap.servers: kafka:9092
        jdbc.connection.max-retry-timeout: 60s
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "5432"
      POSTGRES_DB: dq_pipeline
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip
    volumes:
      - flink-taskmanager-log:/opt/flink/log
      - flink-taskmanager-data:/tmp
      - C:/proj/ldt/src:/opt/flink/e2e/src:ro
      - C:/proj/ldt/scripts:/opt/flink/e2e/scripts:ro
    networks:
      - cadqstream-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 4G
    restart: unless-stopped
    command: taskmanager
    mem_limit: 4g
    shm_size: 512m

  flink-init:
    image: ldt-flink:1.17.1-py
    container_name: ldt-flink-init
    hostname: flink-init
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
      kafka-init:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/flink-init.sh"]
    volumes:
      - ./flink/flink-init.sh:/scripts/flink-init.sh:ro
      - C:/proj/ldt/src:/opt/flink/e2e/src:ro
      - C:/proj/ldt/deployment/scripts:/opt/flink/e2e/scripts:ro
    environment:
      FLINK_REST: http://flink-jobmanager:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "5432"
      POSTGRES_DB: dq_pipeline
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip

  # =============================================================================
  # LAYER 5: ML Platform
  # =============================================================================

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ldt-mlflow
    hostname: mlflow
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1',5000)); s.close()\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_ARTIFACT_ROOT: s3://mlflow-artifacts/
      MLFLOW_SERVER_FILESYSTEM_S3_IGNORE_ENVVARS: "true"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - cadqstream-net
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --default-artifact-root s3://mlflow-artifacts/
      --artifacts-destination s3://mlflow-artifacts/
      --workers 2
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  # =============================================================================
  # LAYER 6: Observability
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ldt-prometheus
    hostname: prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules:/etc/prometheus/alert-rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--query.max-samples=50000000'
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2G

  grafana:
    image: grafana/grafana:10.1.0
    container_name: ldt-grafana
    hostname: grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ADMIN_EMAIL: admin@cadqstream.local
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: info
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ALERTMANAGER_FOR: http://prometheus:9093
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/datasources:/etc/grafana/datasources:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: ldt-node-exporter
    hostname: node-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/metrics || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.filesystem
      - --collector.netdev
      - --collector.netstat
      - --collector.loadavg
      - --collector.uname
      - --collector.stat
      - --collector.time
      - --collector.vmstat
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  cadqstream-metrics:
    build:
      context: .
      dockerfile: cadqstream-metrics/Dockerfile
    container_name: ldt-cadqstream-metrics
    hostname: cadqstream-metrics
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9250/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "9250:9250"
    environment:
      FLINK_JM_URL: http://flink-jobmanager:8081
      FLASK_ENV: production
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # =============================================================================
  # LAYER 7: Data Producer (for demo/testing)
  # =============================================================================

  kafka-producer:
    build:
      context: ./kafka
      dockerfile: Dockerfile.producer
    container_name: ldt-kafka-producer
    hostname: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["python3", "/app/fast_producer.py"]
    command: ["100000", "kafka:9092", "taxi-nyc-raw"]
    volumes:
      - ./kafka/fast_producer.py:/app/fast_producer.py:ro

