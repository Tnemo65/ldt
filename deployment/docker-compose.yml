# =============================================================================
# CA-DQStream Production Deployment - docker-compose.yml
# Architecture: 4-Layer streaming pipeline (Baseline -> Dual-Branch ->
#               Rendezvous+Meta -> IEC) on Apache Flink 1.18.1
# Run: docker compose -f deployment/docker-compose.yml up -d
# =============================================================================

networks:
  cadqstream-net:
    name: cadqstream-net
    driver: bridge

volumes:
  # Infrastructure volumes
  zookeeper-data:
    name: ldt-zookeeper-data
  kafka-data:
    name: ldt-kafka-data
  redis-data:
    name: ldt-redis-data
  minio-data:
    name: ldt-minio-data

  # Observability volumes
  prometheus-data:
    name: ldt-prometheus-data
  grafana-data:
    name: ldt-grafana-data
  ml-models:
    name: ldt-ml-models

  # Flink volumes
  flink-jobmanager-log:
    name: ldt-flink-jobmanager-log
  flink-taskmanager-log:
    name: ldt-flink-taskmanager-log
  flink-checkpoints:
    name: ldt-flink-checkpoints
    # IMPORTANT: Clear this volume before Flink job reset via reset.sh or:
    #   docker volume rm ldt-flink-checkpoints

services:
  # =============================================================================
  # LAYER 1: Kafka Infrastructure
  # =============================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ldt-zookeeper
    hostname: zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ldt-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 1000
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    mem_limit: 4g
    shm_size: 256m
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ldt-kafka-init
    hostname: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/init.sh"]
    volumes:
      - ./kafka/init-scripts:/scripts:ro
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: "9092"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: ldt-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    ports:
      - "8082:8081"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ldt-kafka-ui
    hostname: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      KAFKA_CLUSTERS_0_NAME: cadqstream-local
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIGURATION_ENABLED: "true"
    ports:
      - "8080:8080"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.6.0
    container_name: ldt-kafka-exporter
    hostname: kafka-exporter
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9308/metrics || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --topic.filter=.*
      - --group.filter=.*
    ports:
      - "9308:9308"
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # =============================================================================
  # LAYER 1b: Redis — required by IEC for adaptive threshold caching
  # =============================================================================

  redis:
    image: redis:7-alpine
    container_name: ldt-redis
    hostname: redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # =============================================================================
  # LAYER 2: Storage Services
  # =============================================================================

  minio:
    image: minio/minio:latest
    container_name: ldt-minio
    hostname: minio
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio-data:/data
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

  minio-init:
    image: minio/mc:latest
    container_name: ldt-minio-init
    hostname: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/01-create-buckets.sh"]
    volumes:
      - ./minio/init-scripts:/scripts:ro
    environment:
      MC_HOST: http://minio:9000
      MC_USER: ${MC_MINIO_USER}
      MC_PASS: ${MC_MINIO_PASSWORD}
      MC_ALIAS: local

  # =============================================================================
  # LAYER 4: Flink Streaming
  # =============================================================================

  flink-jobmanager:
    image: ldt-flink:1.18.1-py
    container_name: ldt-flink-jobmanager
    hostname: flink-jobmanager
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      JOB_MANAGER_RPC_PORT: 6123
      JOB_MANAGER_REST_PORT: 8081
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 16
      FLINK_PROPERTIES: |
        # ── State Backend: RocksDB with local checkpoint storage ──────────────────
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///opt/flink/checkpoints/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/checkpoints/flink/savepoints
        state.checkpoints.num-retained: 3
        # FIX LAG: Faster checkpoints
        execution.checkpointing.interval: 120000
        execution.checkpointing.max-concurrent-checkpoints: 1
        execution.checkpointing.min-pause: 60000
        execution.checkpointing.timeout: 300000
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        execution.checkpointing.tolerable-failed-checkpoints: 0
        # CHECKPOINT FIX: Disable unaligned checkpoints via env override.
        # Matches checkpoint_config.disable_unaligned_checkpoints() in flink_job_complete.py
        execution.checkpointing.unaligned.enabled: false
        # ── RocksDB tuning ─────────────────────────────────────────────────────
        state.backend.rocksdb.memory.managed: true
        state.backend.rocksdb.block.cache-size: 512mb
        state.backend.rocksdb.writebuffer.size: 64mb
        state.backend.rocksdb.writebuffer.count: 2
        state.backend.rocksdb.predefined-options: SPINNING_DISK_OPTIMIZED_HIGH_MEM
        # ── Restart & observability ────────────────────────────────────────────
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.delay: 5000
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9248
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        # FIX LAG: Increased parallelism and slots
        parallelism.default: 4
        taskmanager.memory.process.size: 2048m
        taskmanager.memory.managed.fraction: 0.4
        kafka.bootstrap.servers: kafka:9092
        rest.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: "true"
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip:/opt/flink/e2e:/opt/venv/lib/python3.10/site-packages
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MEMSTREAM_MODEL_SIGNING_KEY: ${MEMSTREAM_MODEL_SIGNING_KEY}
      IEC_SIGNING_KEY: ${IEC_SIGNING_KEY}
    ports:
      - "8081:8081"
    volumes:
      - flink-jobmanager-log:/opt/flink/log
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - cadqstream-net
    restart: unless-stopped
    command: jobmanager
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4096M

  flink-taskmanager:
    image: ldt-flink:1.18.1-py
    container_name: ldt-flink-taskmanager
    hostname: flink-taskmanager
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://flink-jobmanager:8081/overview || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      JOB_MANAGER_RPC_PORT: 6123
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 16
      FLINK_PROPERTIES: |
        # ── State Backend: RocksDB with local checkpoint storage ──────────────────
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///opt/flink/checkpoints/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/checkpoints/flink/savepoints
        state.checkpoints.num-retained: 3
        # ── MinIO / S3A: only for ML model artifacts (not checkpoint backend) ──────
        # MinIO endpoint is used by MemStreamScoringOperator for beta/model loading.
        # Hadoop S3A libs are NOT required for Python UDF pipelines.
        s3.access-key: ${MINIO_ROOT_USER}
        s3.secret-key: ${MINIO_ROOT_PASSWORD}
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        # FIX RC#1: Disable classloader leak check that crashes TM with S3A multipart uploads.
        # The Hadoop AWS SDK leaks classloaders in Flink's Python UDF environment.
        # Multi-part uploads trigger retries that accumulate closed classloaders until TM OOMs.
        fs.s3a.clazzloader.check.leaked.classloader: false
        # FIX RC#1: Disable multipart upload entirely — use single-part writes instead.
        # Single-part upload threshold set to 5MB so all writes go through the simple path.
        fs.s3a.multipart.threshold: 5242880
        fs.s3a.multipart.size: 5242880
        # FIX RC#1: Limit concurrent S3A connections to reduce classloader accumulation.
        fs.s3a.connection.maximum: 8
        # FIX RC#1: Reduce connection TTL so stale connections are reclaimed faster.
        fs.s3a.connection.ttl: 30000
        # ── JVM Metaspace: prevent OOM from repeated Python UDF class loading ─────
        taskmanager.memory.jvm-metaspace.size: 512m
        # ── RocksDB tuning ─────────────────────────────────────────────────────
        state.backend.rocksdb.memory.managed: true
        state.backend.rocksdb.block.cache-size: 512mb
        state.backend.rocksdb.writebuffer.size: 64mb
        state.backend.rocksdb.writebuffer.count: 2
        # ── TaskManager resources ──────────────────────────────────────────────
        # CHECKPOINT FIX: 10GB process size for 4-slot parallelism headroom
        # 8 slots × 1GB managed memory each + Python process heap + RocksDB overhead
        taskmanager.memory.process.size: 10240m
        taskmanager.memory.managed.fraction: 0.5
        # CHECKPOINT FIX: G1GC for lower GC pauses during checkpoint coordination
        # Reduces JVM stop-the-world pauses that block checkpoint barrier handling
        taskmanager.memory.jvm-options: "-XX:+UseG1GC -XX:MaxGCPauseMills=500 -XX:+ParallelRefProcEnabled"
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        # FIX LAG: Increased parallelism to drain consumer lag faster
        parallelism.default: 4
        kafka.bootstrap.servers: kafka:9092
        rest.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: "true"
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip:/opt/flink/e2e:/opt/venv/lib/python3.10/site-packages
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MEMSTREAM_MODEL_SIGNING_KEY: ${MEMSTREAM_MODEL_SIGNING_KEY}
      IEC_SIGNING_KEY: ${IEC_SIGNING_KEY}
    volumes:
      - flink-taskmanager-log:/opt/flink/log
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - cadqstream-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 10240M
    restart: unless-stopped
    command: taskmanager
    shm_size: 256m

  flink-init:
    image: ldt-flink:1.18.1-py
    container_name: ldt-flink-init
    hostname: flink-init
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
      kafka-init:
        condition: service_started
    networks:
      - cadqstream-net
    restart: "no"
    entrypoint: ["/bin/bash", "/scripts/flink-init.sh"]
    volumes:
      - ./flink/flink-init.sh:/scripts/flink-init.sh:ro
    environment:
      FLINK_REST: http://flink-jobmanager:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      FLINK_ENV: production
      PYTHONPATH: /opt/flink/pyflink_extracted:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/opt/python/cloudpickle-2.2.0-src.zip:/opt/flink/e2e:/opt/venv/lib/python3.10/site-packages
      MEMSTREAM_MODEL_SIGNING_KEY: ${MEMSTREAM_MODEL_SIGNING_KEY}
      IEC_SIGNING_KEY: ${IEC_SIGNING_KEY}

  # =============================================================================
  # LAYER 4b: ML Service — FastAPI for IEC strategy execution
  # Executes IEC strategies from action-replay-worker:
  #   POST /api/strategy/adjust_threshold
  #   POST /api/strategy/retrain_model
  #   POST /api/strategy/switch_model
  # =============================================================================

  ml-service:
    image: ldt-ml-service:v1.0.0
    container_name: ldt-ml-service
    hostname: ml-service
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"
    environment:
      # All model artifacts stored in MinIO only (no MLflow)
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      MINIO_ENDPOINT: minio:9000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      METRICS_API_KEY: ${METRICS_API_KEY}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_USE_TLS: "false"
      MEMSTREAM_MODEL_SIGNING_KEY: ${MEMSTREAM_MODEL_SIGNING_KEY}
      IEC_SIGNING_KEY: ${IEC_SIGNING_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ml-models:/models
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # =============================================================================
  # LAYER 5b: Action Replay Worker — retries failed IEC actions
  # Consumes from: iec-action-replay
  # Executes via: ml-service:8000
  # DLQ: iec-action-dlq after 10 retries
  # =============================================================================

  action-replay-worker:
    build:
      context: ./action-replay-worker
      dockerfile: Dockerfile
    container_name: ldt-action-replay-worker
    hostname: action-replay-worker
    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ml-service: all model artifacts stored in MinIO only (no MLflow)

  # =============================================================================
  # LAYER 6: Observability
  # =============================================================================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ldt-prometheus
    hostname: prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert-rules:/etc/prometheus/alert-rules
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--query.max-samples=50000000'
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 2G

  grafana:
    image: grafana/grafana:10.1.0
    container_name: ldt-grafana
    hostname: grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_EMAIL: admin@cadqstream.local
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: info
      GF_UNIFIED_ALERTING_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: ldt-node-exporter
    hostname: node-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/metrics || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.filesystem
      - --collector.netdev
      - --collector.netstat
      - --collector.loadavg
      - --collector.uname
      - --collector.stat
      - --collector.time
      - --collector.vmstat
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  cadqstream-metrics:
    build:
      context: ./cadqstream-metrics
      dockerfile: Dockerfile
    container_name: ldt-cadqstream-metrics
    hostname: cadqstream-metrics
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9250/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "9250:9250"
    environment:
      FLINK_JM_URL: http://flink-jobmanager:8081
      FLASK_ENV: production
    networks:
      - cadqstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # =============================================================================
  # LAYER 6b: Stats Writer — aggregates metrics and writes pipeline_stats to MinIO
  # =============================================================================

  stats-writer:
    build:
      context: ./stats-writer
      dockerfile: Dockerfile
    container_name: ldt-stats-writer
    hostname: stats-writer
    depends_on:
      cadqstream-metrics:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cadqstream-net
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      METRICS_URL: http://cadqstream-metrics:9250/metrics
      INTERVAL_SECONDS: "60"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # =============================================================================
  # LAYER 7: Data Producer (for demo/testing)
  # =============================================================================

  kafka-producer:
    build:
      context: ./kafka
      dockerfile: Dockerfile.producer
    container_name: ldt-kafka-producer
    hostname: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TOPIC_RAW: "taxi-nyc-raw-v2"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      PRODUCE_DELAY: "0.05"
      LOOP_INDEFINITELY: "true"
    volumes:
      - ../data:/data:ro
    networks:
      - cadqstream-net
    restart: "unless-stopped"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
