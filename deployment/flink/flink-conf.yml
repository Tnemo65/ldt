# =============================================================================
# Flink Configuration - flink-conf.yml
# =============================================================================

# JobManager
jobmanager.rpc.address: ${JOB_MANAGER_RPC_ADDRESS}
jobmanager.rpc.port: ${JOB_MANAGER_RPC_PORT}
jobmanager.memory.process.size: 2048m
jobmanager.execution.failover-strategy: region

# TaskManager
taskmanager.memory.process.size: 4096m
taskmanager.memory.managed.fraction: 0.4
taskmanager.numberOfTaskSlots: ${TASK_MANAGER_NUMBER_OF_TASK_SLOTS}
taskmanager.memory.task.off-heap.enabled: true
parallelism.default: ${FLINK_PARALLELISM_DEFAULT}

# State Backend: RocksDB with local checkpoint storage
# (overridden by FLINK_PROPERTIES env var in docker-compose.yml)
state.backend.type: rocksdb
state.backend.incremental: true
state.checkpoints.dir: file:///opt/flink/checkpoints/flink/checkpoints
state.savepoints.dir: file:///opt/flink/checkpoints/flink/savepoints
state.checkpoints.num-retained: 3

# RocksDB tuning
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.block.cache-size: 512mb
state.backend.rocksdb.writebuffer.size: 64mb
state.backend.rocksdb.writebuffer.count: 3
state.backend.rocksdb.predefined-options: SPINNING_DISK_OPTIMIZED_HIGH_MEM

# S3 / MinIO: only for ML model artifact loading (Python UDF level)
# Hadoop S3A libs are NOT bundled — do NOT use s3:// URIs for checkpoint backend
s3.endpoint: http://minio:9000
s3.path.style.access: true

# JVM Metaspace: prevent OOM from repeated Python UDF class loading
taskmanager.memory.jvm-metaspace.size: 512m

# Checkpointing
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.interval: ${FLINK_CHECKPOINT_INTERVAL}
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.min-pause: 30000
execution.checkpointing.timeout: 300000
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
execution.checkpointing.tolerable-failed-checkpoints: 0
execution.checkpointing.aligned-checkpoint-timeout: 60000

# Restart Strategy
restart-strategy: fixed-delay
restart-strategy.fixed-delay.initial-backoff: 5000
restart-strategy.fixed-delay.max-attempts: 5
restart-strategy.fixed-delay.backoff-multiplier: 1.0

# REST API
rest.port: 8081
rest.bind-address: 0.0.0.0
rest.address: flink-jobmanager
rest.enable_cors: true

# Metrics
metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prom.port: 9248
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.scope.system.jobmanager: jobmanager
metrics.scope.taskmanager: taskmanager
metrics.scope.operator: operator

# Network
taskmanager.network.memory.fraction: 0.15
taskmanager.network.memory.min: 128mb
taskmanager.network.memory.max: 2048mb

# Python UDF
python.udf.runner.script: /opt/flink/pyflink_extracted/pyflink/bin/pyflink-udf-runner.sh
python.client.executor.args: --python /usr/local/bin/python3

# Pipeline
pipeline.auto.type-info-hierarchy.enabled: true
pipeline.object-reuse.max-age: 60000

# PyFlink optimization
python.execution.reuse-slot-for-inner-classes: true
