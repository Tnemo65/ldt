# SSL client configuration for kafka-init container
# Used with --command-config when creating topics over TLS

security.protocol=SSL
ssl.key.password=${KAFKA_SSL_KEY_PASSWORD}
ssl.keystore.location=/certs/kafka.keystore.jks
ssl.keystore.password=${KAFKA_SSL_PASSWORD}
ssl.truststore.location=/certs/kafka.truststore.jks
ssl.truststore.password=${KAFKA_SSL_PASSWORD}
ssl.enabled.protocols=TLSv1.2,TLSv1.3
ssl.endpoint.identification.algorithm=
