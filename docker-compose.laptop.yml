# Docker Compose for Laptop (16GB RAM, ~8GB available)
# Minimal services with memory limits

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    mem_limit: 512m
    cpus: 0.5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 1  # Giảm từ 168 xuống 1 giờ
      KAFKA_LOG_SEGMENT_BYTES: 104857600  # 100MB (giảm từ 1GB)
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"  # Giảm heap
    mem_limit: 1g
    cpus: 1.0

  postgres:
    image: postgres:15-alpine  # Alpine nhẹ hơn
    environment:
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      POSTGRES_DB: dq_pipeline
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=50
      -c work_mem=4MB
    mem_limit: 512m
    cpus: 0.5

# Skip: schema-registry, pgbouncer, minio (không cần thiết cho testing)

# Total memory: ~2GB cho 3 services
