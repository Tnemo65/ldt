# Flink Configuration for CA-DQStream

# JobManager
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1600m
jobmanager.memory.jvm-metaspace.size: 256m

# TaskManager
taskmanager.memory.process.size: 2048m
taskmanager.memory.jvm-metaspace.size: 256m
taskmanager.numberOfTaskSlots: 4
taskmanager.memory.managed.fraction: 0.3

# Parallelism
parallelism.default: 4

# State Backend
state.backend: rocksdb
state.backend.incremental: true
state.checkpoints.dir: s3://cadqstream-checkpoints/checkpoints
state.savepoints.dir: s3://cadqstream-checkpoints/savepoints

# Checkpointing
execution.checkpointing.interval: 60000
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 600000
execution.checkpointing.min-pause: 30000
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

# REST API
rest.port: 8081
rest.address: 0.0.0.0
rest.bind-address: 0.0.0.0
rest.enable-cors: true

# Metrics
metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prom.port: 9249
metrics.reporter.prom.host: 0.0.0.0

# Kafka Consumer
kafka.consumer.commitOffsetsOnCheckpoints: true
kafka.consumer.offset.commit.timeout.ms: 10000

# Network
taskmanager.network.memory.fraction: 0.1
taskmanager.network.memory.min: 64mb
taskmanager.network.memory.max: 512mb

# Security
security.ssl.internal.enabled: false
