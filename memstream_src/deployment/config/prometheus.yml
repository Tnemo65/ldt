# =============================================================================
# Prometheus Configuration for CA-DQStream + MemStream v5
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cadqstream'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'cadqstream-alertmanager:9093'

# Load rules from external files
rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/rules/*.yaml'

scrape_configs:
  # =============================================================================
  # PROMETHEUS SELF
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # =============================================================================
  # FLINK JOBMANAGER
  # =============================================================================
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['cadqstream-jobmanager:9249']
        labels:
          service: 'flink'
          component: 'jobmanager'
    metrics_path: /metrics
    scrape_interval: 15s

  # =============================================================================
  # FLINK TASKMANAGER
  # =============================================================================
  - job_name: 'flink-taskmanager'
    static_configs:
      - targets: ['cadqstream-taskmanager:9249']
        labels:
          service: 'flink'
          component: 'taskmanager'
    metrics_path: /metrics
    scrape_interval: 15s

  # =============================================================================
  # CADQSTREAM METRICS
  # =============================================================================
  - job_name: 'cadqstream-metrics'
    static_configs:
      - targets: ['cadqstream-metrics:9250']
        labels:
          service: 'cadqstream'
    metrics_path: /metrics
    scrape_interval: 10s

  # =============================================================================
  # KAFKA
  # =============================================================================
  - job_name: 'kafka'
    static_configs:
      - targets: ['cadqstream-kafka-exporter:9308']
        labels:
          service: 'kafka'
    metrics_path: /metrics
    scrape_interval: 30s

  # =============================================================================
  # REDIS
  # =============================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['cadqstream-redis:6379']
        labels:
          service: 'redis'
    scrape_interval: 30s

  # =============================================================================
  # MINIO
  # =============================================================================
  - job_name: 'minio'
    static_configs:
      - targets: ['cadqstream-minio:9000']
        labels:
          service: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    scrape_interval: 30s

  # =============================================================================
  # ML SERVICE
  # =============================================================================
  - job_name: 'ml-service'
    static_configs:
      - targets: ['cadqstream-ml-service:8000']
        labels:
          service: 'ml-service'
    metrics_path: /metrics
    scrape_interval: 15s

  # =============================================================================
  # NODE EXPORTER
  # =============================================================================
  - job_name: 'node'
    static_configs:
      - targets: ['cadqstream-node-exporter:9100']
        labels:
          service: 'node-exporter'
    scrape_interval: 30s
