# CA-DQStream Docker Compose - NFS Volumes (Bypass RAID)
# Uses /nfs mount points to avoid local RAID I/O bottleneck

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      # ✅ NFS mount - bypass local RAID
      - /nfs/interns/dacthinh/docker-volumes/cadqstream/zookeeper-data:/var/lib/zookeeper/data
      - /nfs/interns/dacthinh/docker-volumes/cadqstream/zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - cadqstream-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      # ✅ NFS mount - bypass local RAID
      - /nfs/interns/dacthinh/docker-volumes/cadqstream/kafka-data:/var/lib/kafka/data
    networks:
      - cadqstream-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - cadqstream-net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cadqstream
      POSTGRES_PASSWORD: cadqstream123
      POSTGRES_DB: dq_pipeline
    ports:
      - "5432:5432"
    volumes:
      # ✅ NFS mount - bypass local RAID
      - /nfs/interns/dacthinh/docker-volumes/cadqstream/postgres-data:/var/lib/postgresql/data
    networks:
      - cadqstream-net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      - postgres
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://cadqstream:cadqstream123@postgres:5432/dq_pipeline
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
    networks:
      - cadqstream-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      # ✅ NFS mount - bypass local RAID
      - /nfs/interns/dacthinh/docker-volumes/cadqstream/minio-data:/data
    networks:
      - cadqstream-net

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - cadqstream-net

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - cadqstream-net

# No named volumes needed - using direct NFS mounts

volumes:
  prometheus-data:
  grafana-data:

networks:
  cadqstream-net:
    driver: bridge
